<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RuneCraft SMP | Season 2</title>
    <meta
      name="description"
      content="RuneCraft SMP Season 2 - links, members, and creator applications."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scene" aria-hidden="true">
      <div
        class="asset asset--sword"
        data-depth="34"
        data-spin="12"
        style="--left: 8%; --top: 12%; --size: 130px; --duration: 7.4s; --delay: -1.4s;"
      >
        <div class="asset-float">
          <img class="asset-image" src="assets/sword-user.png" alt="" />
        </div>
      </div>

      <div
        class="asset asset--grass"
        data-depth="24"
        data-spin="-6"
        style="--left: 79%; --top: 18%; --size: 150px; --duration: 8.3s; --delay: -2.1s;"
      >
        <div class="asset-float">
          <img class="asset-image" src="assets/grass-block-user.png" alt="" />
        </div>
      </div>

      <div
        class="asset asset--bucket"
        data-depth="30"
        data-spin="10"
        style="--left: 6%; --top: 72%; --size: 150px; --duration: 7.8s; --delay: -3.7s;"
      >
        <div class="asset-float">
          <img class="asset-image" src="assets/axolotl-bucket-user.png" alt="" />
        </div>
      </div>

      <div
        class="asset asset--bee"
        data-depth="18"
        data-spin="-14"
        style="--left: 82%; --top: 70%; --size: 118px; --duration: 6.7s; --delay: -1.1s;"
      >
        <div class="asset-float">
          <img class="asset-image" src="assets/bee-user.png" alt="" />
        </div>
      </div>

      <div
        class="asset asset--slime"
        data-depth="28"
        data-spin="9"
        style="--left: 74%; --top: 3%; --size: 122px; --duration: 8.6s; --delay: -4.2s;"
      >
        <div class="asset-float">
          <img class="asset-image" src="assets/slime-pixel.svg" alt="" />
        </div>
      </div>

      <div
        class="asset asset--allay"
        data-depth="22"
        data-spin="-10"
        style="--left: 44%; --top: 6%; --size: 116px; --duration: 7.1s; --delay: -2.8s;"
      >
        <div class="asset-float">
          <img class="asset-image" src="assets/allay-pixel.svg" alt="" />
        </div>
      </div>

      <div class="mouse-glow"></div>
    </div>

    <main class="page-shell">
      <section class="panel hero-panel">
        <p class="eyebrow">RuneCraft SMP</p>
        <img
          class="logo"
          src="runecraft-logo.png"
          alt="RuneCraft SMP logo"
        />
        <h1>Season 2</h1>
        <p class="hero-copy">
          A creator-driven Minecraft SMP packed with fresh builds, adventures,
          and chaotic fun.
        </p>

        <div class="link-row" aria-label="RuneCraft social links">
          <a
            class="button-link"
            href="https://discord.gg/rcBhyxFrws"
            target="_blank"
            rel="noreferrer"
            >Join Discord</a
          >
          <a
            class="button-link button-link--gold"
            href="https://www.tiktok.com/@runecraft.smp"
            target="_blank"
            rel="noreferrer"
            >Watch on TikTok</a
          >
        </div>
      </section>

      <section class="panel members-panel">
        <div class="section-head">
          <div>
            <p class="section-label">Creator Lineup</p>
            <h2>RuneCraft Members</h2>
          </div>
          <a
            class="apply-link"
            href="https://tinyurl.com/RuneCraftsmp"
            target="_blank"
            rel="noreferrer"
            >Are you a content creator? Apply here</a
          >
        </div>

        <div class="member-grid" id="member-grid"></div>

        <p class="member-note">
          This list will be updated as more creators join RuneCraft!
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
